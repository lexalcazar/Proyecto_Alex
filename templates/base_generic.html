{% load static %}
<!-- Base generic-->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <title>{% block title %}Proyecto Alex{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <a class="skip-link" href="#main">Saltar al contenido</a>

    <header class="header" role="banner">
        <div class="container header-inner">
            <a class="brand" href="{% url 'index' %}">Proyecto Alex</a>
            <nav class="nav" role="navigation" aria-label="Principal">
                <a href="{% url 'index' %}">Inicio</a>
                <a href="{% url 'login' %}">Entrar</a>
                <a href="/api/usuarios/">API usuarios</a>
            </nav>
        </div>
    </header>

    <main id="main" class="container" role="main">
        {% block content %}
        {% endblock %}
    </main>
    <footer class="container center small text-muted" role="contentinfo" style="padding:1rem 0;">
        <p>&copy; 2024 Proyecto Alex. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
